<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interwave</title>
<style>
/* Reset & fonts */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{color:#fff;}

/* Background animation */
.background{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
background: radial-gradient(circle at 20% 20%, #ff00ff, transparent 30%),
            radial-gradient(circle at 80% 80%, #00ffff, transparent 30%),
            radial-gradient(circle at 50% 50%, #ff69b4, transparent 40%);
background-size:200% 200%;
animation: moveBG 30s linear infinite;}
@keyframes moveBG{0%{background-position:0% 0%,100% 100%,50% 50%;}50%{background-position:100% 0%,0% 100%,50% 50%;}100%{background-position:0% 0%,100% 100%,50% 50%;}}

/* Sidebar */
.sidebar{position:fixed;left:0;top:0;width:60px;height:100%;background:#111;display:flex;flex-direction:column;align-items:center;padding-top:20px;}
.sidebar-btn{margin:20px 0;position:relative;cursor:pointer;}
.sidebar-btn img{width:40px;}
.tooltip{visibility:hidden;background:#333;color:#fff;text-align:center;padding:4px 8px;border-radius:4px;position:absolute;left:60px;top:50%;transform:translateY(-50%);white-space:nowrap;}
.sidebar-btn:hover .tooltip{visibility:visible;}

/* Main content */
.main-content{margin-left:80px;padding:40px;}
h1{font-size:3em;margin-bottom:20px;}

/* Search bar */
.search-container{display:flex;margin-bottom:20px;}
.search-container input{padding:10px;font-size:1em;flex:1;border:none;border-radius:4px 0 0 4px;}
.search-container button{padding:10px;font-size:1em;border:none;background:#ff69b4;color:#fff;border-radius:0 4px 4px 0;cursor:pointer;}
.search-results iframe{width:100%;height:400px;border:none;margin-top:20px;border-radius:8px;}

/* Sections */
.section{margin-top:40px;}
.section h2{margin-bottom:20px;font-size:2em;}

/* Grids */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px;}
.tile{position:relative;cursor:pointer;}
.tile img{width:100%;border-radius:8px;}
.tile-name{position:absolute;bottom:0;width:100%;text-align:center;background:rgba(0,0,0,0.7);color:#fff;padding:4px;border-radius:0 0 8px 8px;opacity:0;transition:opacity 0.3s;}
.tile:hover .tile-name{opacity:1;}

/* Iframes */
.tile-frame iframe{width:100%;height:500px;border-radius:8px;border:none;margin-top:20px;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-btn" onclick="showSection('search')">
    <img src="https://i.imgur.com/0f2f2Fh.png" alt="Search">
    <span class="tooltip">Search</span>
  </div>
  <div class="sidebar-btn" onclick="showSection('games')">
    <img src="https://i.imgur.com/6Fdbz4q.png" alt="Games">
    <span class="tooltip">Games</span>
  </div>
  <div class="sidebar-btn" onclick="showSection('movies')">
    <img src="https://i.imgur.com/QhF5r8L.png" alt="Movies">
    <span class="tooltip">Movies</span>
  </div>
</div>

<div class="main-content">
  <h1>Interwave</h1>

  <!-- Search Section -->
  <div id="search" class="section">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search DuckDuckGo...">
      <button onclick="searchDuck()">Search</button>
    </div>
    <div class="search-results">
      <iframe id="searchFrame" src=""></iframe>
    </div>
  </div>

  <!-- Games Section -->
  <div id="games" class="section" style="display:none;">
    <h2>Games</h2>
    <div class="grid">
      <div class="tile" onclick="openTile('https://buckshotroulette.com/game1
','gameFrame')">
        <img src="https://via.placeholder.com/150/ff69b4/000000?text=Buckshot" alt="Buckshot">
        <span class="tile-name">Buckshot Roulette</span>
      </div>
      <div class="tile" onclick="openTile('https://slopeio.org/game2','gameFrame')">
        <img src="https://via.placeholder.com/150/00ffff/000000?text=Slope" alt="Slope">
        <span class="tile-name">Slope</span>
      </div>
      <div class="tile" onclick="openTile('https://1v1lol.us.com/game3','gameFrame')">
        <img src="https://via.placeholder.com/150/ff00ff/000000?text=1v1.lol" alt="1v1">
        <span class="tile-name">1v1.lol</span>
      </div>
    </div>
    <div class="tile-frame">
      <iframe id="gameFrame" src=""></iframe>
    </div>
  </div>

  <!-- Movies Section -->
  <div id="movies" class="section" style="display:none;">
    <h2>Movies</h2>
    <div class="grid">
      <div class="tile" onclick="openTile('https://www.disneyplus.com','movieFrame')">
        <img src="https://via.placeholder.com/150/ff0000/ffffff?text=Disney+" alt="Disney+">
        <span class="tile-name">Disney+</span>
      </div>
      <div class="tile" onclick="openTile('https://www.netflix.com','movieFrame')">
        <img src="https://via.placeholder.com/150/000000/ffffff?text=Netflix" alt="Netflix">
        <span class="tile-name">Netflix</span>
      </div>
      <div class="tile" onclick="openTile('https://www.crunchyroll.com','movieFrame')">
        <img src="https://via.placeholder.com/150/ffff00/000000?text=Crunchyroll" alt="Crunchyroll">
        <span class="tile-name">Crunchyroll</span>
      </div>
    </div>
    <div class="tile-frame">
      <iframe id="movieFrame" src=""></iframe>
    </div>
  </div>

</div>

<div class="background"></div>

<script>
// Show only selected section
function showSection(id){
  document.getElementById('search').style.display='none';
  document.getElementById('games').style.display='none';
  document.getElementById('movies').style.display='none';
  document.getElementById(id).style.display='block';
}

// Search DuckDuckGo
function searchDuck(){
  const query=document.getElementById('searchInput').value;
  const iframe=document.getElementById('searchFrame');
  if(query.trim()!==''){iframe.src=`https://duckduckgo.com/?q=${encodeURIComponent(query)}&ia=web`;}
}

// Open game/movie in iframe
function openTile(url,iframeId){
  document.getElementById(iframeId).src=url;
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}
</script>

</body>
</html>
